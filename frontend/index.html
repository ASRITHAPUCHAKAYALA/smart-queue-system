<!DOCTYPE html>
<html>
<head>
  <title>Smart Queue System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- 🔵 HEADER -->
  <header class="navbar">
    <h1>Smart Queue Management</h1>
    <div>
      <button onclick="location.href='pages/login.html'">Login</button>
      <button onclick="location.href='pages/signup.html'">Signup</button>
    </div>
  </header>

  <!-- 🟣 HERO SECTION -->
  <section class="hero">
    <h2>Skip the Wait. Join the Smart Queue.</h2>
    <p>Book your slot online and track your position in real-time.</p>
  </section>

  <!-- 🟢 SERVICES -->
  <div class="services">

    <div class="service-card" onclick="goToService('hospital')">
      🏥
      <h3>Hospital</h3>
      <p>Book doctor appointments easily</p>
    </div>

    <div class="service-card" onclick="goToService('bank')">
      🏦
      <h3>Bank</h3>
      <p>Skip long bank queues</p>
    </div>

    <div class="service-card" onclick="goToService('store')">
      🛒
      <h3>Store</h3>
      <p>Fast checkout experience</p>
    </div>

    <div class="service-card" onclick="goToService('office')">
      🏢
      <h3>Office</h3>
      <p>Manage office visits smoothly</p>
    </div>

  </div>

  <script>
    function goToService(type) {
      window.location.href = `pages/service.html?type=${type}`;
    }
  </script>

</body>
</html>
