<!DOCTYPE html>
<html>
<head>
  <title>Queue Status</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <div class="container">
    <h2>📊 Queue Status</h2>

    <div class="card big">
      <h3 id="name"></h3>
      <p id="status"></p>
    </div>

    <div class="grid">
      <div class="card">
        <h4>Position</h4>
        <p id="position"></p>
      </div>

      <div class="card">
        <h4>People Ahead</h4>
        <p id="peopleAhead"></p>
      </div>

      <div class="card">
        <h4>Waiting Time</h4>
        <p id="waitingTime"></p>
      </div>
    </div>
  </div>

  <script src="../js/queue.js"></script>

</body>
</html>
