<!DOCTYPE html>
<html>

</head>

    <h2>📝 Book Your Slot</h2>

    </div>
  </div>

  <!-- ✅ KEEP JS AT BOTTOM -->
  <script src="../js/booking.js"></script>

</body>
</html>
